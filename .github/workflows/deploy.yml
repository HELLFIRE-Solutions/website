name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
        working-directory: .

      - run: npm run build
        working-directory: .

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ vars.HELLFIRE_DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.HELLFIRE_DEPLOY_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HELLFIRE_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" dist/ "$DEPLOY_USER@$DEPLOY_HOST:/var/www/hellfiresol.com/html/"
